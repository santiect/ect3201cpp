name: Build Slides

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Marp
        run: npm install -g @marp-team/marp-cli

      - name: Build slides
        run: |
          mkdir public
          marp slides/*.md --theme-set theme --html -o public
          marp index.md --theme-set theme --html -o public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:

    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4