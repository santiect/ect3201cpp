name: Build Slides

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Marp
        run: npm install -g @marp-team/marp-cli

      - name: Generate index
        run: |
          chmod +x scripts/generate_index.sh
          ./scripts/generate_index.sh

      - name: Build slides
        run: |
          mkdir public
          marp slides --html --theme-set theme --output public
          marp index.md --html --theme-set theme --output public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:

    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4