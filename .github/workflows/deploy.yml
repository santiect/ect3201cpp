name: Deploy Marp Slides to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Generate index.md
        run: bash scripts/generate_index.sh

      - name: Export slide index to HTML
        run: marp indice.md --html --theme-set theme/ect.css --theme ect

      - name: Export slides to HTML
        run: marp slides/*.md --html --theme-set theme/ect.css --theme ect

      - name: Export labs to HTML
        run: |
          UNPUBLISHED="$(awk '
            /^unpublished_items:[[:space:]]*$/ { in_list=1; next }
            in_list && /^[[:space:]]*-[[:space:]]+/ { sub(/^[[:space:]]*-[[:space:]]+/, ""); print; next }
            in_list && !/^[[:space:]]*-/ { in_list=0 }
          ' config/site.yml)"
          is_unpublished() {
            local target="$1"
            while IFS= read -r item; do
              [ -z "$item" ] && continue
              [ "$target" = "$item" ] && return 0
            done <<< "$UNPUBLISHED"
            return 1
          }
          for file in labs/lab-*.md; do
            is_unpublished "$file" && continue
            marp "$file" --html --theme-set theme/ect.css --theme ect
          done

      - name: Export exercise lists to HTML
        run: marp listas/*.md --html --theme-set theme/ect.css --theme ect

      - name: Export slides to PDF
        run: marp slides/*.md --pdf --theme-set theme/ect.css --theme ect

      - name: Export labs to PDF
        run: |
          UNPUBLISHED="$(awk '
            /^unpublished_items:[[:space:]]*$/ { in_list=1; next }
            in_list && /^[[:space:]]*-[[:space:]]+/ { sub(/^[[:space:]]*-[[:space:]]+/, ""); print; next }
            in_list && !/^[[:space:]]*-/ { in_list=0 }
          ' config/site.yml)"
          is_unpublished() {
            local target="$1"
            while IFS= read -r item; do
              [ -z "$item" ] && continue
              [ "$target" = "$item" ] && return 0
            done <<< "$UNPUBLISHED"
            return 1
          }
          for file in labs/lab-*.md; do
            is_unpublished "$file" && continue
            marp "$file" --pdf --theme-set theme/ect.css --theme ect
          done

      - name: Export exercise lists to PDF
        run: marp listas/*.md --pdf --theme-set theme/ect.css --theme ect

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
