name: Deploy Marp Materiais to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Generate index.md
        run: bash scripts/generate_index.sh

      - name: Export slide index to HTML
        run: marp indice.md --html --theme-set theme/ect.css --theme ect

      - name: Export aulas to HTML
        run: marp materiais/aulas/*.md --html --theme-set theme/ect.css --theme ect

      - name: Export labs to HTML
        run: |
          UNPUBLISHED="$(awk '
            /^unpublished_items:[[:space:]]*$/ { in_list=1; next }
            in_list && /^[[:space:]]*-[[:space:]]+/ { sub(/^[[:space:]]*-[[:space:]]+/, ""); print; next }
            in_list && !/^[[:space:]]*-/ { in_list=0 }
          ' config/site.yml | tr -d '\r' | sed -e 's/^"//' -e 's/"$//')"
          is_unpublished() {
            local target="$1"
            while IFS= read -r item; do
              [ -z "$item" ] && continue
              [ "$target" = "$item" ] && return 0
            done <<< "$UNPUBLISHED"
            return 1
          }
          for file in materiais/labs/lab-*.md; do
            is_unpublished "$file" && continue
            marp "$file" --html --theme-set theme/ect.css --theme ect
          done

      - name: Export exercise lists to HTML
        run: marp materiais/listas/*.md --html --theme-set theme/ect.css --theme ect

      - name: Export simulados to HTML
        run: marp materiais/simulados/*.md --html --theme-set theme/ect.css --theme ect

      - name: Export aulas to PDF
        run: marp materiais/aulas/*.md --pdf --theme-set theme/ect.css --theme ect

      - name: Export labs to PDF
        run: |
          UNPUBLISHED="$(awk '
            /^unpublished_items:[[:space:]]*$/ { in_list=1; next }
            in_list && /^[[:space:]]*-[[:space:]]+/ { sub(/^[[:space:]]*-[[:space:]]+/, ""); print; next }
            in_list && !/^[[:space:]]*-/ { in_list=0 }
          ' config/site.yml | tr -d '\r' | sed -e 's/^"//' -e 's/"$//')"
          is_unpublished() {
            local target="$1"
            while IFS= read -r item; do
              [ -z "$item" ] && continue
              [ "$target" = "$item" ] && return 0
            done <<< "$UNPUBLISHED"
            return 1
          }
          for file in materiais/labs/lab-*.md; do
            is_unpublished "$file" && continue
            marp "$file" --pdf --theme-set theme/ect.css --theme ect
          done

      - name: Remove unpublished generated outputs
        run: |
          awk '
            /^unpublished_items:[[:space:]]*$/ { in_list=1; next }
            in_list && /^[[:space:]]*-[[:space:]]+/ { sub(/^[[:space:]]*-[[:space:]]+/, ""); print; next }
            in_list && !/^[[:space:]]*-/ { in_list=0 }
          ' config/site.yml | tr -d '\r' | sed -e 's/^"//' -e 's/"$//' | while IFS= read -r md; do
            [ -z "$md" ] && continue
            base="${md%.md}"
            rm -f "${base}.html" "${base}.pdf"
          done

      - name: Export exercise lists to PDF
        run: marp materiais/listas/*.md --pdf --theme-set theme/ect.css --theme ect

      - name: Export simulados to PDF
        run: marp materiais/simulados/*.md --pdf --theme-set theme/ect.css --theme ect

      - name: Inject Google Analytics into generated HTML
        run: |
          bash scripts/inject_analytics.sh config/site.yml index.html indice.html materiais/aulas/*.html materiais/labs/*.html materiais/listas/*.html materiais/simulados/*.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



